apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  namespace: muchtodo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: muchtodo-api:latest # Ensure this matches your local build tag
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        envFrom:
        - configMapRef:
            name: backend-config